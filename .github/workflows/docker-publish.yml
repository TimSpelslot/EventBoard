name: Build and Push Docker Image

on:
  push:
    branches: [ main ]
  workflow_dispatch:  # allows manual run from Actions tab; branch is chosen when you run it

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  prebuild:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker-container

      - name: Prebuild Docker layers (no push)
        uses: docker/build-push-action@v6
        with:
          context: backend
          file: backend/Dockerfile
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

  backend_test:
    runs-on: ubuntu-latest

    permissions:
      contents: read
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Use Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install uv
        run: pip install uv
      - name: Run backend tests
        run: |
          uv sync --extra test
          uv run pytest
        working-directory: backend/

  frontend_test:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Use Node.js 23
        uses: actions/setup-node@v4
        with:
          node-version: 23.x
          cache: 'npm'
          cache-dependency-path: frontend/
      - run: npm ci
        working-directory: frontend/

      - name: Generate Firebase messaging service worker from secrets
        run: |
          cat > frontend/public/firebase-messaging-sw.js <<EOF
          importScripts('https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js');
          importScripts('https://www.gstatic.com/firebasejs/9.0.0/firebase-messaging-compat.js');

          firebase.initializeApp({
            apiKey: "${FB_API_KEY}",
            authDomain: "${FB_AUTH_DOMAIN}",
            projectId: "${FB_PROJECT_ID}",
            storageBucket: "${FB_STORAGE_BUCKET}",
            messagingSenderId: "${FB_MESSAGING_SENDER_ID}",
            appId: "${FB_APP_ID}",
          });

          const messaging = firebase.messaging();

          messaging.onBackgroundMessage((payload) => {
            const notificationTitle = payload.data.title || 'Adventure Board Update';
            const notificationOptions = {
              body: payload.data.body || '',
              icon: '/spelslot-logo.png',
              data: {
                clickUrl: payload.data.click_action || '/'
              }
            };

            self.registration.showNotification(notificationTitle, notificationOptions);
          });

          self.addEventListener('notificationclick', (event) => {
            event.notification.close();

            let targetUrl = event.notification.data?.clickUrl;
            if (targetUrl === 'OPEN_APP' || !targetUrl) {
              targetUrl = self.location.origin + '/#/';
            }

            event.waitUntil(
              clients.matchAll({ type: 'window', includeUncontrolled: true }).then((windowClients) => {
                for (const client of windowClients) {
                  if (client.url.includes(targetUrl) && 'focus' in client) {
                    return client.focus();
                  }
                }
                if (clients.openWindow) {
                  return clients.openWindow(targetUrl);
                }
              })
            );
          });
          EOF
        env:
          FB_API_KEY: ${{ secrets.FB_API_KEY }}
          FB_AUTH_DOMAIN: ${{ secrets.FB_AUTH_DOMAIN }}
          FB_PROJECT_ID: ${{ secrets.FB_PROJECT_ID }}
          FB_STORAGE_BUCKET: ${{ secrets.FB_STORAGE_BUCKET }}
          FB_MESSAGING_SENDER_ID: ${{ secrets.FB_MESSAGING_SENDER_ID }}
          FB_APP_ID: ${{ secrets.FB_APP_ID }}
      - run: npm test
        working-directory: frontend/
      - run: npm run build
        working-directory: frontend/
        env:
          FB_API_KEY: ${{ secrets.FB_API_KEY }}
          FB_AUTH_DOMAIN: ${{ secrets.FB_AUTH_DOMAIN }}
          FB_PROJECT_ID: ${{ secrets.FB_PROJECT_ID }}
          FB_STORAGE_BUCKET: ${{ secrets.FB_STORAGE_BUCKET }}
          FB_MESSAGING_SENDER_ID: ${{ secrets.FB_MESSAGING_SENDER_ID }}
          FB_APP_ID: ${{ secrets.FB_APP_ID }}
          FB_MEASUREMENT_ID: ${{ secrets.FB_MEASUREMENT_ID }}
          FB_VAPID_KEY: ${{ secrets.FB_VAPID_KEY }}
      - run: rsync -a --delete frontend/dist/spa/ backend/app/static/

      - name: Upload static assets
        uses: actions/upload-artifact@v4
        with:
          name: static-assets
          path: backend/app/static/

  build:
    runs-on: ubuntu-latest
    needs: [backend_test, frontend_test]
    env:
      FIREBASE_SERVICE_ACCOUNT_JSON_B64: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON_B64 }}

    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker-container

      - name: Download static assets
        uses: actions/download-artifact@v4
        with:
          name: static-assets
          path: backend/app/static/

      - name: Inject Firebase service account key for backend
        if: ${{ env.FIREBASE_SERVICE_ACCOUNT_JSON_B64 != '' }}
        run: |
          mkdir -p backend/app/config
          echo "${FIREBASE_SERVICE_ACCOUNT_JSON_B64}" | base64 -d > backend/app/config/serviceAccountKey.json

      - name: Warn if backend Firebase service account is missing
        if: ${{ env.FIREBASE_SERVICE_ACCOUNT_JSON_B64 == '' }}
        run: |
          echo "::warning::FIREBASE_SERVICE_ACCOUNT_JSON_B64 secret is missing. Backend Firebase messaging will be disabled."

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}

      - name: Build and push Docker image
        id: push
        uses: docker/build-push-action@v6
        with:
          context: backend
          file: backend/Dockerfile
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
